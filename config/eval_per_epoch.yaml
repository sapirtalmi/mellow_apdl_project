---
mode: 'evaluate_checkpoint'
gpu: True
resume_checkpoint: ""
debug_samples: null
checkpoint_path: ''  # set by script

data:
    datapath: '/home/yandex/APDL2526a/idantarshish/mellow_apdl_project/data'
    datafiles:
        - '/home/yandex/APDL2526a/sapirtalmi/mellow_apdl_project/datafiles/val_captioning_500.json'
    sampling_rate: 32000
    segment_seconds: 10
    tokenizer_type: "HuggingFaceTB/SmolLM2-135M"
    op_text_len: 250
    ip_text_len: 129

model:
    encoder:
        audioenc_name: 'HTSAT'
        transformer_embed_dim: 768
        out_emb: 768
        d_proj: 576
        use_pretrained_audioencoder: True
        freeze_audio_encoder_weights: True
        pretrained_audioencoder_path: '/home/yandex/APDL2526a/sapirtalmi/mellow_apdl_project/htsat'
    decoder:
      text_decoder: "HuggingFaceTB/SmolLM2-135M"
      prefix_length: 40
      total_prefix_length: 389
      freeze_gpt_weights: False
    model_type: Mellow
    input_channels: 1
    output_channels: 1
    resume_checkpoint: ""
    inference_window: 5

train:
    optimizer:
        optimizer_type: Adam
        learning_rate: 1e-4
        warm_up_steps: 10000
        reduce_lr_steps: 1000000
        weight_decay: 0.0001
        scheduler: "cosine"
    max_grad_norm: 0.5
    emergency_stop_grad_norm: 1e6
    num_nodes: 1
    num_workers: 0
    persistent_data_workers: True
    loss_type: sisdr_wav
    sync_batchnorm: False
    batch_size: 4
    num_epochs: 1
    log_step: 1
    sav_per_num_epochs: 1
    random_seed: 1234
    mixed_precision:
        use_mixed_precision: False
        mixed_precision_dtype: "float16"
